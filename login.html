<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscribe | Nimbus Weather</title>
    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .auth-container {
            max-width: 500px;
            margin: 4rem auto;
            padding: 3rem;
            text-align: center;
        }

        .auth-icon {
            color: var(--accent-color);
            width: 64px;
            height: 64px;
            margin-bottom: 1.5rem;
        }

        .auth-title {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .auth-subtitle {
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .auth-input {
            width: 100%;
            padding: 1rem 1.5rem;
            font-size: 1rem;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            outline: none;
            transition: all 0.3s ease;
        }
        
        [data-theme="dark"] .auth-input {
            background: rgba(0, 0, 0, 0.2);
        }

        .auth-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .auth-button {
            width: 100%;
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            background: var(--accent-color);
            color: white;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .auth-button:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }

        .auth-button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
    </style>
    <script>
        const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-brand">
            <i data-lucide="cloud-sun"></i> Nimbus
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="history.html">History</a></li>
            <li><a href="team.html">Team</a></li>
            <li><a href="login.html" class="active">Subscribe</a></li>
        </ul>
        <button id="theme-toggle" class="theme-toggle">
            <i data-lucide="moon"></i>
        </button>
    </nav>

    <main class="container">
        <div class="auth-container glass">
            <i data-lucide="mail" class="auth-icon"></i>
            <h1 class="auth-title">Daily Reports</h1>
            <p class="auth-subtitle">Get the weather for your favorite city sent straight to your inbox every morning at 8 AM.</p>

            <form id="subscribe-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="auth-input" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="city">City for Forecast</label>
                    <input type="text" id="city" class="auth-input" placeholder="e.g. London, Tokyo, New York" required>
                </div>

                <button type="submit" id="submit-btn" class="auth-button">
                    <i data-lucide="send"></i> Subscribe Now
                </button>
            </form>
        </div>
    </main>

    <!-- Scripts -->
    <script src="js/app.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
