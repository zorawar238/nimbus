<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nimbus Weather | Modern Forecast</title>
    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-brand">
            <i data-lucide="cloud-sun"></i> Nimbus
        </a>
        <ul class="nav-links">
            <li><a href="index.html" class="active">Home</a></li>
            <li><a href="history.html">History</a></li>
            <li><a href="team.html">Team</a></li>
            <li><a href="login.html">Subscribe</a></li>
        </ul>
        <button id="theme-toggle" class="theme-toggle">
            <i data-lucide="moon"></i>
        </button>
    </nav>

    <main class="container">
        <div class="search-container">
            <input type="text" id="search-input" class="search-input" placeholder="Search for a city..." autocomplete="off">
            <button id="search-btn" class="search-btn"><i data-lucide="search"></i></button>
            <button id="location-btn" class="location-btn" title="Use My Location"><i data-lucide="map-pin"></i></button>
            <div id="recent-searches" class="recent-searches glass">
                <!-- Recent searches will go here -->
            </div>
        </div>

        <div id="loading" style="display: none; text-align: center; padding: 3rem;">
            <div class="spinner"></div>
            <p style="margin-top: 1rem; color: var(--text-secondary);">Loading weather data...</p>
        </div>

        <div id="weather-content" class="weather-dashboard" style="display: none;">
            <div class="current-weather glass">
                <h2 id="city-name" style="font-size: 1.5rem; font-weight: 600;">--</h2>
                <i id="weather-icon" data-lucide="cloud" class="weather-icon-large"></i>
                <div id="temp" class="temperature">--°C</div>
                <div id="condition" class="condition">--</div>
                
                <div class="weather-details">
                    <div class="detail-card">
                        <i data-lucide="droplets"></i>
                        <span>Humidity</span>
                        <strong id="humidity">--%</strong>
                    </div>
                    <div class="detail-card">
                        <i data-lucide="wind"></i>
                        <span>Wind Speed</span>
                        <strong id="wind">-- km/h</strong>
                    </div>
                </div>
            </div>

            <div class="forecast-container glass">
                <h3 class="forecast-title">Hourly Temperature Trend</h3>
                <div class="chart-wrapper">
                    <canvas id="forecastChart"></canvas>
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="js/app.js"></script>
    <script src="js/weather.js"></script>
</body>
</html>
